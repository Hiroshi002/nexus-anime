# Standalone typecheck workflow.
#
# TypeScript strictness (no `any`, no `ts-ignore`) is load-bearing for this
# project — a separate workflow gives fast signal on type regressions and
# lets the team gate merging on types without waiting for tests to finish.

name: Typecheck

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
