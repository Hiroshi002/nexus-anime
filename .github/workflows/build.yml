# Standalone build workflow.
#
# Build catches what eslint and tsc can't — broken imports, unresolved
# workspace links, turbo graph errors, and misconfigured Next.js routes.
# Keeping it standalone means a broken build fails fast independent of
# slower tests.

name: Build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
