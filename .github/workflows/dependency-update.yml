# Dependency update verification.
#
# This is NOT Dependabot itself — Dependabot opens PRs; this workflow
# runs CI when an ecosystem it doesn't own updates the lockfile (e.g.
# when a maintainer runs `pnpm update` or when the lockfile is patched
# manually). It's a backstop that ensures PRs titled
# `chore(deps): ...` still pass the same gates as any other change.
#
# It does NOT bump dependencies — that's Dependabot's job. This is just
# "run CI when a PR touches pnpm-lock.yaml".

name: Dependency Update

on:
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "package.json"
      - "apps/**/package.json"
      - "packages/**/package.json"
      - ".github/workflows/dependency-update.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-deps:
    name: verify-deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm format:check
