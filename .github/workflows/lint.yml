# Standalone lint workflow.
#
# Exists alongside `ci.yml` so that pure-style feedback is one click away
# in the PR check list and fails independently of typecheck/test/build.
# Useful when a reporter wants to iterate on formatting without waiting for
# the longer CI run.

name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
