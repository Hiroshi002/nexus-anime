# Production deployment workflow.
#
# Triggered by a semver tag push (`v*`). Before deploying to production,
# the tagged commit must pass CI, so this workflow first builds and
# verifies, then hands off to your deployment provider.
#
# Like `deploy-preview.yml`, the provider is configurable. Two common
# approaches are documented below.
#
# Secrets used here are sourced from the `production` GitHub
# environment — configure GH_REPO/settings/environments/production with:
#   - VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID  (Vercel)
#   - Or your provider's equivalent.

name: Deploy (Production)

on:
  push:
    tags:
      - "v*"

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy-production:
    name: deploy-production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nexus-anime.com # <-- Update to your production domain.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      # --- Option A: Vercel GitHub App ---
      # If you use the Vercel app, this workflow can just verify the build;
      # the app handles the actual deploy of the tagged commit.
      - name: Production deploy (Vercel)
        if: false
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-comment: false

      # --- Option B: Manual / custom provider ---
      # Replace with your deploy step. Example patterns:
      #   - Cloudflare Pages (direct-upload or Worker deploy)
      #   - AWS: aws ecs update-service / aws s3 sync + cloudfront invalidation
      #   - Netlify: netlify deploy --prod
      - name: Deploy to production (placeholder)
        run: |
          # Replace with your real deploy command:
          #   npx wrangler deploy ...
          #   aws ecs update-service ...
          #   netlify deploy --prod ...
          echo "::notice::Configure your production deploy step before tagging releases"
          echo "::notice::Tagged commit ${{ github.ref_name }} is ready."

      - name: Create GitHub Deployment
        uses: chrnorm/deployment-action@v2
        with:
          token: ${{ github.token }}
          environment: production
          description: Production deploy of ${{ github.ref_name }}
          initial-status: success
